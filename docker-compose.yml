services:
  www:
    container_name: www
    build: .
    ports:
      - "8010:80"
    volumes:
      - ./Src:/var/www/html/
    networks:
      - default
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
