name: Website monitoring

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Run screenshot monitoring
        uses: guibranco/github-screenshot-action@v2.0.22
        with:
          json_file: "sites.json"
          output_dir: "Src/imagens/screenshots/"
          concurrency: "5"
          retries: "2"
          timeout_ms: "20000"
          create_pr: "true"
          branch_name: "monitor/screenshots"
          wait_until: "networkidle2"
          square: "true"
          viewport_width: "1280"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
