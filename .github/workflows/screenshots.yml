name: Website monitoring

on:
  schedule:
    - cron: "0 */6 * * *" # every 6 hours
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          path: temp_repo

      - name: Run screenshot monitoring
        uses: guibranco/github-screenshot-action@v1.0.2
        with:
          json_file: "temp_repo/sites.json"
          output_dir: "temp_repo/Src/imagens/screenshots/"
          concurrency: "5"
          retries: "2"
          timeout_ms: "20000"
          create_pr: "true"
          branch_name: "monitor/screenshots"
