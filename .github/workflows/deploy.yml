name: Deploy via ftp
on:
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: build-deploy

jobs:

  deploy:
    name: Deploy website to FTP
    runs-on: ubuntu-latest
    outputs:
      semVer: ${{ steps.gitversion.outputs.semVer }}
      
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v4
        with:
          versionSpec: "6.x"

      - name: Determine Version
        id: gitversion
        uses: gittools/actions/gitversion/execute@v4

      - name: Generate secrets.php
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          FETCH_TOKEN: ${{ secrets.FETCH_TOKEN }}
        run: |
          printf '<?php\ndefine("GH_PAT", "%s");\ndefine("FETCH_TOKEN", "%s");\n' \
            "$GH_PAT" "$FETCH_TOKEN" > Src/secrets.php

      - name: Fetch GitHub Pages sites and cache images
        run: php Src/fetch-github-sites.php

      - name: Upload CSV report artifact
        uses: actions/upload-artifact@v7
        with:
          name: github-pages-report
          path: github-pages-report.csv

      - name: Zip files
        run: |
          cd Src
          zip -r deploy.zip . -x install.php
          cd ..
          mkdir Deploy
          mv Src/deploy.zip Deploy
          cp "Src/install.php" Deploy

      - name: Upload service
        uses: sebastianpopp/ftp-action@releases/v2
        with:
          host: ${{ secrets.FTP_SERVER }}
          user: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          localDir: "Deploy/"
          remoteDir: "/"

      - name: Call install endpoint
        run: |
          curl "${{ secrets.INSTALLATION_ENDPOINT }}install.php"
          
  create_release:
    name: Create release
    needs: deploy
    env:
      SEMVER: ${{ needs.deploy.outputs.semVer }}
    runs-on: ubuntu-latest

    steps:
      - name: Download CSV report artifact
        uses: actions/download-artifact@v8
        with:
          name: github-pages-report

      - name: Create Release
        uses: ncipollo/release-action@v1.21.0
        with:
          skipIfReleaseExists: true
          allowUpdates: false
          draft: false
          makeLatest: true
          tag: v${{ env.SEMVER }}
          name: Release v${{ env.SEMVER }}
          generateReleaseNotes: true
          body: Release ${{ env.SEMVER }} of ${{ github.repository }}
          artifacts: "github-pages-report.csv"
